name: docker-build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platforms:
        description: build platforms
        required: false
        default: linux/amd64,linux/arm64
      push:
        description: push image
        required: false
        default: "false"
      enable_upx:
        description: enable UPX compression (true/false)
        required: false
        default: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Prepare build args
        id: vars
        shell: bash
        run: |
          VERSION="$(cat VERSION | tr -d '[:space:]')"
          BUILDTIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          REVISION="${GITHUB_SHA}"

          # Platforms: use input or default
          PLATFORMS="${{ inputs.platforms || 'linux/amd64,linux/arm64' }}"

          # Push: auto-push on tag, otherwise use input
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            PUSH_ENABLED=true
          else
            if [[ "${{ inputs.push }}" == "true" ]]; then
              PUSH_ENABLED=true
            else
              PUSH_ENABLED=false
            fi
          fi

          # UPX
          ENABLE_UPX_RAW="${{ inputs.enable_upx || 'true' }}"
          case "${ENABLE_UPX_RAW}" in
            false|0|no|off) ENABLE_UPX=0 ;;
            *) ENABLE_UPX=1 ;;
          esac

          # Image tags: version+latest on tag push, dev on manual
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            echo "image_tags<<EOF" >> "${GITHUB_OUTPUT}"
            echo "ghcr.io/${GITHUB_REPOSITORY}/vohive:latest" >> "${GITHUB_OUTPUT}"
            echo "ghcr.io/${GITHUB_REPOSITORY}/vohive:${VERSION}" >> "${GITHUB_OUTPUT}"
            echo "EOF" >> "${GITHUB_OUTPUT}"
          else
            echo "image_tags=ghcr.io/${GITHUB_REPOSITORY}/vohive:dev" >> "${GITHUB_OUTPUT}"
          fi

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "buildtime=${BUILDTIME}" >> "${GITHUB_OUTPUT}"
          echo "revision=${REVISION}" >> "${GITHUB_OUTPUT}"
          echo "enable_upx=${ENABLE_UPX}" >> "${GITHUB_OUTPUT}"
          echo "platforms=${PLATFORMS}" >> "${GITHUB_OUTPUT}"
          echo "push_enabled=${PUSH_ENABLED}" >> "${GITHUB_OUTPUT}"

      - uses: docker/setup-qemu-action@v3
        if: ${{ contains(steps.vars.outputs.platforms, 'arm') || contains(steps.vars.outputs.platforms, 'ppc') || contains(steps.vars.outputs.platforms, 's390') || contains(steps.vars.outputs.platforms, 'riscv') }}
        with:
          platforms: all

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: ${{ steps.vars.outputs.push_enabled == 'true' }}
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.github
          platforms: ${{ steps.vars.outputs.platforms }}
          push: ${{ steps.vars.outputs.push_enabled == 'true' }}
          tags: ${{ steps.vars.outputs.image_tags }}
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            gh_pat=${{ secrets.GH_PAT }}
          build-args: |
            VERSION=${{ steps.vars.outputs.version }}
            BUILDTIME=${{ steps.vars.outputs.buildtime }}
            REVISION=${{ steps.vars.outputs.revision }}
            ENABLE_UPX=${{ steps.vars.outputs.enable_upx }}
            GH_PAT=${{ secrets.GH_PAT }}
