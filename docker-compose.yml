# VoHive Docker Compose — pre-built image from DockerHub
# Image: voorz/vohive
# Usage: docker compose up -d

services:
  vohive:
    image: voorz/vohive:latest
    container_name: vohive
    restart: unless-stopped
    network_mode: host        # required for 4G/5G interface management
    privileged: true          # required for USB device / net / tun access
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
      - /dev:/dev             # USB modem passthrough
    environment:
      - TZ=Asia/Shanghai
      - CONFIG_PATH=/app/config/config.yaml
      # - HTTPS_PROXY=http://your-proxy:port   # uncomment if needed
